<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-5wqsJI1+/GKhkxTOp+Gz7pSoSLjKvCqxCFH7+Rll0uw=' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://localhost:44320; connect-src 'self' https://localhost:44320; object-src 'none'; base-uri 'self'; form-action 'self'">
  <!-- FH7: resource hints — warm API + font/CDN connections before first use -->
  <link rel="preconnect" href="https://localhost:44320" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MyMoney — تسجيل الدخول">
  <title data-i18n-page-title="auth.login.page_title">تسجيل الدخول | MyMoney</title>

  <link rel="stylesheet" href="/assets/css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/vendors/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="stylesheet" href="/assets/css/auth.css">
  <link rel="stylesheet" href="/assets/css/components.css">

    <link rel="stylesheet" href="/assets/css/enhance.css">
  <link rel="icon" href="/assets/images/favicon/favicon.ico">
  <script>
  (function(){
    try{
      var lang=localStorage.getItem('mm.lang')||'ar';
      document.documentElement.lang=lang;
      document.documentElement.dir=lang==='ar'?'rtl':'ltr';
      if(lang==='ar'&&!document.getElementById('mm-rtl-stylesheet')){
        var l=document.createElement('link');
        l.id='mm-rtl-stylesheet';l.rel='stylesheet';l.href='/assets/css/rtl.css';
        document.head.appendChild(l);
      }
      var theme=localStorage.getItem('mm.theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',theme);
      document.documentElement.setAttribute('data-bs-theme',theme);
      document.documentElement.classList.add('mm-init');
    }catch(e){}
    /* Safety net: never leave the page invisible. If app JS has not revealed
       the body (module load failure / uncaught error), force-reveal it. */
    function mmReveal(){document.documentElement.classList.remove('mm-init');}
    setTimeout(mmReveal,4000);
    window.addEventListener('error',mmReveal);
    window.addEventListener('unhandledrejection',mmReveal);
  })();
  </script>
</head>

<body class="auth-body">

  <div class="auth-controls-top">
    <button type="button"
            data-lang-switch
            data-i18n="layout.lang_switch_label"
            data-i18n-aria-label="layout.lang_switch_aria"
            aria-label="التبديل إلى الإنجليزية">
      EN
    </button>
    <button type="button"
            data-theme-toggle
            data-i18n-aria-label="layout.switch_to_dark"
            aria-label="التبديل إلى الوضع الداكن"
            title="التبديل إلى الوضع الداكن">
      <i class="bi bi-moon-stars" data-theme-icon aria-hidden="true"></i>
    </button>
  </div>

  <main class="auth-page">
    <section class="auth-card animate-fade-up">

      <!-- Brand -->
      <a class="auth-brand" href="/index.html">
        <span class="brand-icon"><i class="bi bi-wallet2" aria-hidden="true"></i></span>
        <span class="auth-brand-copy">
          <span class="auth-brand-name">MyMoney</span>
          <span class="auth-brand-tagline" data-i18n="auth.login.brand_tagline">سجّل دخولك إلى حسابك.</span>
        </span>
      </a>

      <!-- Visual banner -->
      <div class="auth-visual" aria-hidden="true">
        <i class="bi bi-wallet2 auth-visual-icon"></i>
      </div>

      <!-- Form header -->
      <div class="mb-4">
        <p class="eyebrow mb-1" data-i18n="auth.login.eyebrow">وصول آمن</p>
        <h1 class="h3 mb-1" data-i18n="auth.login.title">تسجيل الدخول</h1>
        <p class="text-muted mb-0" data-i18n="auth.login.subtitle">سجّل دخولك إلى حسابك في MyMoney.</p>
      </div>

      <!-- Session-ended notice (shown when user revoked their own session) -->
      <div class="alert alert-info d-none mb-3" id="loginNotice" role="alert">
        <i class="bi bi-info-circle me-2" aria-hidden="true"></i>
        <span data-i18n="auth.login.session_ended">انتهت جلستك. يرجى تسجيل الدخول مجدداً.</span>
      </div>

      <!-- Error summary (shown by JS on API errors) -->
      <div class="alert alert-danger d-none mb-3" id="formErrorSummary" role="alert">
        <ul class="mb-0 ps-3" id="formErrorList"></ul>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="needs-validation" novalidate>

        <div class="mb-3">
          <label class="form-label" for="loginEmail" data-i18n="auth.login.email_label">البريد الإلكتروني</label>
          <input class="form-control" id="loginEmail" type="email"
                 autocomplete="email"
                 dir="ltr"
                 data-i18n-placeholder="auth.login.email_placeholder"
                 placeholder="example@email.com"
                 required>
          <div class="invalid-feedback" data-i18n="auth.login.email_error">يرجى إدخال بريد إلكتروني صحيح.</div>
        </div>

        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label class="form-label mb-0" for="loginPassword" data-i18n="auth.login.password_label">كلمة المرور</label>
            <a class="small fw-semibold" href="/pages/auth/forgot-password.html" data-i18n="auth.login.forgot_link">نسيت كلمة المرور؟</a>
          </div>
          <input class="form-control mt-1" id="loginPassword" type="password"
                 autocomplete="current-password"
                 data-i18n-placeholder="auth.login.password_placeholder"
                 placeholder="••••••••"
                 required>
          <div class="invalid-feedback" data-i18n="auth.login.password_error">كلمة المرور مطلوبة.</div>
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe" data-i18n="auth.login.remember_me">تذكّرني</label>
        </div>

        <button class="btn btn-primary w-100" type="submit" id="loginBtn">
          <i class="bi bi-box-arrow-in-right" aria-hidden="true"></i>
          <span data-i18n="auth.login.submit">دخول</span>
        </button>

      </form>

      <!-- Footer link -->
      <div class="auth-footer">
        <span data-i18n="auth.login.no_account">ليس لديك حساب؟</span>
        <a href="/pages/auth/register.html" data-i18n="auth.login.create_account">إنشاء حساب جديد</a>
      </div>

    </section>
  </main>

  <script src="/assets/js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/login.js"></script>
</body>
</html>
