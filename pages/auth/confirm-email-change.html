<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'sha256-5wqsJI1+/GKhkxTOp+Gz7pSoSLjKvCqxCFH7+Rll0uw=' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://localhost:44320; connect-src 'self' https://localhost:44320; object-src 'none'; base-uri 'self'; form-action 'self'">
  <!-- FH7: resource hints — warm API + font/CDN connections before first use -->
  <link rel="preconnect" href="https://localhost:44320" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MyMoney — تأكيد تغيير البريد الإلكتروني">
  <title data-i18n-page-title="settings.confirm_email_change_page_title">تأكيد تغيير البريد الإلكتروني | MyMoney</title>

  <link rel="stylesheet" href="/assets/css/vendor/bootstrap.min.css">
  <link rel="stylesheet" href="/assets/vendors/bootstrap-icons/bootstrap-icons.css">
  <link rel="stylesheet" href="/assets/css/app.css">
  <link rel="stylesheet" href="/assets/css/auth.css">

  <link rel="icon" href="/assets/images/favicon/favicon.ico">
  <script>
  (function(){
    try{
      var lang=localStorage.getItem('mm.lang')||'ar';
      document.documentElement.lang=lang;
      document.documentElement.dir=lang==='ar'?'rtl':'ltr';
      if(lang==='ar'&&!document.getElementById('mm-rtl-stylesheet')){
        var l=document.createElement('link');
        l.id='mm-rtl-stylesheet';l.rel='stylesheet';l.href='/assets/css/rtl.css';
        document.head.appendChild(l);
      }
      var theme=localStorage.getItem('mm.theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',theme);
      document.documentElement.setAttribute('data-bs-theme',theme);
      document.documentElement.classList.add('mm-init');
    }catch(e){}
    /* Safety net: never leave the page invisible. If app JS has not revealed
       the body (module load failure / uncaught error), force-reveal it. */
    function mmReveal(){document.documentElement.classList.remove('mm-init');}
    setTimeout(mmReveal,4000);
    window.addEventListener('error',mmReveal);
    window.addEventListener('unhandledrejection',mmReveal);
  })();
  </script>
</head>

<body class="auth-body">

  <main class="auth-shell">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <img src="/assets/images/logo/logo.svg" alt="MyMoney" class="auth-logo" width="40" height="40">
        <span class="auth-brand-name" data-i18n="common.app_name">MyMoney</span>
      </div>

      <!-- Verifying state (default) -->
      <div id="stateVerifying" class="auth-content text-center">
        <div class="spinner-border text-primary mb-3" role="status">
          <span class="visually-hidden" data-i18n="settings.confirm_email_change_verifying">جاري التحقق...</span>
        </div>
        <p class="text-muted" data-i18n="settings.confirm_email_change_verifying">جاري التحقق...</p>
      </div>

      <!-- Success state (hidden) -->
      <div id="stateSuccess" class="auth-content text-center d-none">
        <div class="mb-3">
          <i class="bi bi-envelope-check-fill text-success" style="font-size:3rem;" aria-hidden="true"></i>
        </div>
        <h1 class="h4 fw-bold mb-2" data-i18n="settings.confirm_email_change_success_title">
          تم تغيير البريد الإلكتروني
        </h1>
        <p class="text-muted mb-4" data-i18n="settings.confirm_email_change_success_message">
          تم تغيير بريدك الإلكتروني بنجاح. يرجى تسجيل الدخول مجدداً.
        </p>
        <a href="/pages/auth/login.html" class="btn btn-primary">
          <i class="bi bi-box-arrow-in-left me-1" aria-hidden="true"></i>
          <span data-i18n="settings.confirm_email_change_go_login">تسجيل الدخول</span>
        </a>
      </div>

      <!-- Error state (hidden) -->
      <div id="stateError" class="auth-content text-center d-none">
        <div class="mb-3">
          <i class="bi bi-x-circle-fill text-danger" style="font-size:3rem;" aria-hidden="true"></i>
        </div>
        <h1 class="h4 fw-bold mb-2" data-i18n="settings.confirm_email_change_error_title">
          فشل التأكيد
        </h1>
        <p class="text-muted mb-4" data-i18n="settings.confirm_email_change_error_message">
          الرابط غير صالح أو منتهي الصلاحية أو تم استخدامه مسبقاً.
        </p>
        <a href="/pages/auth/login.html" class="btn btn-outline-secondary">
          <i class="bi bi-house me-1" aria-hidden="true"></i>
          <span data-i18n="settings.confirm_email_change_go_login">تسجيل الدخول</span>
        </a>
      </div>

    </div>
  </main>

  <script src="/assets/js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="/assets/js/pages/confirm-email-change.js"></script>
</body>
</html>
