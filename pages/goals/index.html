  <script>
  (function(){
    try{
      var lang=localStorage.getItem('mm.lang')||'ar';
      document.documentElement.lang=lang;
      document.documentElement.dir=lang==='ar'?'rtl':'ltr';
      if(lang==='ar'&&!document.getElementById('mm-rtl-stylesheet')){
        var l=document.createElement('link');
        l.id='mm-rtl-stylesheet';l.rel='stylesheet';l.href='/assets/css/rtl.css';
        document.head.appendChild(l);
      }
      var theme=localStorage.getItem('mm.theme')||(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',theme);
      document.documentElement.setAttribute('data-bs-theme',theme);
      document.documentElement.classList.add('mm-init');
    }catch(e){}
    /* Safety net: never leave the page invisible. If app JS has not revealed
       the body (module load failure / uncaught error), force-reveal it. */
    function mmReveal(){document.documentElement.classList.remove('mm-init');}
    setTimeout(mmReveal,4000);
    window.addEventListener('error',mmReveal);
    window.addEventListener('unhandledrejection',mmReveal);
  })();
  </script>

            <div class="col-6 col-md-4 col-lg-2" id="_sklKpi2"><div class="goal-card-skeleton"></div></div>

            <div class="col-6 col-md-4 col-lg-2" id="_sklKpi6"><div class="goal-card-skeleton"></div></div>

            <div class="col-12 col-md-6 col-xl-4"><div class="goal-card-skeleton"></div></div>
            <div class="col-12 col-md-6 col-xl-4"><div class="goal-card-skeleton"></div></div>
          </div>
        </div>

        <!-- ── No data / first-time empty ───────────────────────────────── -->
        <div id="goalsNoData" class="d-none">
          <div class="mm-page-header mb-4 d-flex align-items-start justify-content-between">
            <div>
              <p class="eyebrow" data-i18n="goals.eyebrow"></p>
              <h1 class="mm-page-title" data-i18n="goals.heading"></h1>

          <!-- KPI strip -->
          <div class="row g-3 mb-4" id="goalsKpiStrip"></div>

          <!-- Filter bar -->

            <select id="filterStatus" class="form-select form-select-sm">
              <option value="" data-i18n="goals.filter_all_status"></option>
              <option value="1" data-i18n="goals.status_active"></option>
              <option value="2" data-i18n="goals.status_paused"></option>
              <option value="3" data-i18n="goals.status_completed"></option>
            </select>
            <select id="filterType" class="form-select form-select-sm">
              <option value="" data-i18n="goals.filter_all_types"></option>

              <option value="2" data-i18n="goals.type_car"></option>
              <option value="3" data-i18n="goals.type_home"></option>
              <option value="4" data-i18n="goals.type_vacation"></option>
              <option value="5" data-i18n="goals.type_education"></option>
              <option value="6" data-i18n="goals.type_investment"></option>

  <!-- ══════════════════════════════════════════════════════════════════════
       WIZARD MODAL — Multi-step goal creation
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="goalWizardModal" class="modal fade" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" data-i18n="goals.wizard_title"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-3 pb-4 px-4">

          <!-- Step progress bar -->
          <div class="wizard-steps-bar mb-4">
            <div class="wizard-step-node active" id="wizNode1">
              <div class="wizard-step-dot" id="wizDot1">1</div>
              <div class="wizard-step-lbl" data-i18n="goals.wizard_step_type"></div>
            </div>
            <div class="wizard-step-node" id="wizNode2">
              <div class="wizard-step-dot" id="wizDot2">2</div>
              <div class="wizard-step-lbl" data-i18n="goals.wizard_step_details"></div>
            </div>
            <div class="wizard-step-node" id="wizNode3">
              <div class="wizard-step-dot" id="wizDot3">3</div>
              <div class="wizard-step-lbl" data-i18n="goals.wizard_step_amount"></div>
            </div>
            <div class="wizard-step-node" id="wizNode4">
              <div class="wizard-step-dot" id="wizDot4">4</div>
              <div class="wizard-step-lbl" data-i18n="goals.wizard_step_schedule"></div>
            </div>
          </div>

          <!-- Step 1: Goal type -->
          <div id="wizStep1">
            <p class="text-muted mb-3" data-i18n="goals.wizard_choose_type"></p>
            <div class="wizard-type-grid" id="wizTypeGrid"></div>
          </div>

          <!-- Step 2: Name & description -->
          <div id="wizStep2" class="d-none">
            <div class="mb-3">
              <label class="form-label fw-semibold" data-i18n="goals.field_name"></label>
              <input id="wizName" type="text" class="form-control" autocomplete="off">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" data-i18n="goals.field_description"></label>
              <textarea id="wizDesc" class="form-control" rows="3"></textarea>
            </div>
          </div>

          <!-- Step 3: Amounts -->
          <div id="wizStep3" class="d-none">
            <div class="mb-3">
              <label class="form-label fw-semibold" data-i18n="goals.field_target_amount"></label>
              <input id="wizTargetAmount" type="number" min="0.001" step="0.001" class="form-control">
            </div>
            <div class="mb-2">
              <label class="form-label fw-semibold" data-i18n="goals.field_initial_amount"></label>
              <input id="wizInitialAmount" type="number" min="0" step="0.001" class="form-control">
            </div>
            <p class="text-muted small" data-i18n="goals.field_initial_amount_hint"></p>
          </div>

          <!-- Step 4: Schedule & priority -->
          <div id="wizStep4" class="d-none">
            <div class="mb-3">
              <label class="form-label fw-semibold" data-i18n="goals.field_target_date"></label>
              <input id="wizTargetDate" type="date" class="form-control">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" data-i18n="goals.field_priority"></label>
              <select id="wizPriority" class="form-select">
                <option value="4" data-i18n="goals.priority_critical"></option>
                <option value="3" data-i18n="goals.priority_high"></option>
                <option value="2" selected data-i18n="goals.priority_medium"></option>
                <option value="1" data-i18n="goals.priority_low"></option>
              </select>
            </div>
          </div>

        </div>
        <div class="modal-footer border-0 pt-0 px-4 pb-4 d-flex justify-content-between">
          <button id="wizBackBtn" class="btn btn-outline-secondary d-none" data-i18n="goals.wizard_back"></button>
          <div class="ms-auto d-flex gap-2">
            <button id="wizNextBtn" class="btn btn-primary" disabled data-i18n="goals.wizard_next"></button>
            <button id="wizCreateBtn" class="btn btn-primary d-none">
              <i class="bi bi-check-circle me-2"></i>
              <span data-i18n="goals.wizard_create"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════════════════

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">

        </div>
        <div class="modal-body px-4">

            <label class="form-label fw-semibold" data-i18n="goals.modal_amount"></label>

          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" data-i18n="goals.modal_date"></label>
            <input id="ctbDate" type="date" class="form-control">
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold" data-i18n="goals.modal_notes"></label>

        </div>
        <div class="modal-footer border-0 px-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel"></button>
          <button type="button" id="ctbSubmitBtn" class="btn btn-primary">
            <span data-i18n="goals.modal_confirm"></span>
          </button>
        </div>
      </div>
    </div>

            <label class="form-label fw-semibold" data-i18n="goals.modal_date"></label>

        <div class="modal-footer border-0 px-4">

        </div>
      </div>
    </div>

       ADJUST MODAL
       ══════════════════════════════════════════════════════════════════════ -->
  <div id="adjustModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" data-i18n="goals.modal_adjust_title"></h5>

        <div class="modal-body px-4">
          <div class="mb-1">
            <small class="text-muted" data-i18n="goals.modal_current_amount"></small>

          </div>
          <div class="mb-3 mt-2">
            <label class="form-label fw-semibold" data-i18n="goals.modal_new_amount"></label>
            <input id="adjNewAmount" type="number" min="0" step="0.001" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" data-i18n="goals.modal_date"></label>
            <input id="adjDate" type="date" class="form-control">
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold" data-i18n="goals.modal_notes"></label>
            <textarea id="adjNotes" class="form-control" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer border-0 px-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel"></button>

            <span data-i18n="goals.modal_confirm"></span>
          </button>
        </div>

            <div class="col-12">
              <label class="form-label fw-semibold" data-i18n="goals.field_description"></label>

            <div class="col-12 col-md-6">

            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold" data-i18n="goals.field_target_date"></label>
              <input id="editTargetDate" type="date" class="form-control">
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label fw-semibold" data-i18n="goals.field_priority"></label>
              <select id="editPriority" class="form-select">
                <option value="4" data-i18n="goals.priority_critical"></option>
                <option value="3" data-i18n="goals.priority_high"></option>
                <option value="2" data-i18n="goals.priority_medium"></option>
                <option value="1" data-i18n="goals.priority_low"></option>
              </select>

          </div>
        </div>
        <div class="modal-footer border-0 px-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" data-i18n="common.cancel"></button>
          <button type="button" id="editSaveBtn" class="btn btn-primary">
            <span data-i18n="goals.edit_save"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

       DELETE CONFIRM MODAL
       ══════════════════════════════════════════════════════════════════════ -->

          <h5 class="modal-title fw-bold text-danger" data-i18n="goals.delete_confirm_title"></h5>

                  data-i18n="goals.completed_btn"></button>
        </div>
      </div>
